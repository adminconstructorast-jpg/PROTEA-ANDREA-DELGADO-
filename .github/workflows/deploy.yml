name: Deploy · PROTEA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FIREBASE_PROJECT: protea-andrea-delgado

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. Validación: typecheck de todos los workspaces en cada push/PR.
  # ─────────────────────────────────────────────────────────────────────
  validate:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Typecheck
        run: npm run typecheck --workspaces --if-present
      - name: Build web (Next.js)
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT }}

  # ─────────────────────────────────────────────────────────────────────
  # 2. Deploy: solo en push a main, tras validar.
  # ─────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy a Firebase
    needs: validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build de Cloud Functions
        run: npm run build --workspace=functions

      - name: Autenticación con Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Service account con roles: Firebase Admin, Cloud Functions Admin,
          # Service Account User. Guardar el JSON en el secreto del repo.
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Habilitar APIs de Google Cloud necesarias
        # Los proyectos nuevos no traen estas APIs activadas; gcloud aborta en
        # modo no-interactivo con "would you like to enable? (y/N)" en vez de
        # activarlas sola. Se intenta habilitarlas aquí, pero la cuenta de
        # servicio de CI deliberadamente NO tiene el rol Service Usage Admin
        # (permitiría prender/apagar cualquier API del proyecto). Si falla por
        # permisos, no se aborta el deploy: se asume que ya se habilitaron una
        # vez manualmente por un usuario con rol de owner/editor.
        continue-on-error: true
        run: |
          gcloud services enable \
            secretmanager.googleapis.com \
            cloudfunctions.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            run.googleapis.com \
            eventarc.googleapis.com \
            pubsub.googleapis.com \
            cloudscheduler.googleapis.com \
            firebasestorage.googleapis.com \
            firebaserules.googleapis.com \
            cloudbilling.googleapis.com \
            firebaseextensions.googleapis.com \
            --project="${{ env.FIREBASE_PROJECT }}"

      # El sitio público real lo sirve Vercel (ver vercel.json), no Firebase
      # Hosting — se removió el paso de FirebaseExtended/action-hosting-deploy
      # porque su empaquetado de Next.js como Cloud Function no resuelve
      # @protea/shared (paquete del workspace, no publicado en npm) y aborta
      # todo el job antes de llegar a lo que sí importa: Cloud Functions.

      - name: Asegurar secretos de Cloud Functions en Secret Manager
        # Los `defineSecret()` de functions/src/config.ts deben existir en Secret
        # Manager antes de un `firebase deploy --non-interactive` (no hay forma
        # de capturar el valor por prompt). Si el repo ya tiene el secreto de
        # GitHub correspondiente (integración real lista), se usa ese valor y
        # se actualiza en cada deploy; si no, se crea un placeholder una sola
        # vez para no bloquear el deploy — sustitúyelo luego con
        # `firebase functions:secrets:set NOMBRE` o en Secret Manager.
        run: |
          set -e
          declare -A SECRETS=(
            [WHATSAPP_TOKEN]="${{ secrets.WHATSAPP_TOKEN }}"
            [WHATSAPP_APP_SECRET]="${{ secrets.WHATSAPP_APP_SECRET }}"
            [WHATSAPP_VERIFY_TOKEN]="${{ secrets.WHATSAPP_VERIFY_TOKEN }}"
            [ANTHROPIC_API_KEY]="${{ secrets.ANTHROPIC_API_KEY }}"
            [STRIPE_SECRET_KEY]="${{ secrets.STRIPE_SECRET_KEY }}"
            [STRIPE_WEBHOOK_SECRET]="${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            [PAC_API_KEY]="${{ secrets.PAC_API_KEY }}"
          )
          for NAME in "${!SECRETS[@]}"; do
            VALUE="${SECRETS[$NAME]}"
            EXISTS=false
            if gcloud secrets describe "$NAME" --project="${{ env.FIREBASE_PROJECT }}" >/dev/null 2>&1; then
              EXISTS=true
            fi
            if [ -n "$VALUE" ]; then
              if [ "$EXISTS" = true ]; then
                printf '%s' "$VALUE" | gcloud secrets versions add "$NAME" --project="${{ env.FIREBASE_PROJECT }}" --data-file=-
              else
                printf '%s' "$VALUE" | gcloud secrets create "$NAME" --project="${{ env.FIREBASE_PROJECT }}" --data-file=- --replication-policy=automatic
              fi
            elif [ "$EXISTS" = false ]; then
              printf 'PENDING_CONFIGURATION' | gcloud secrets create "$NAME" --project="${{ env.FIREBASE_PROJECT }}" --data-file=- --replication-policy=automatic
            fi
          done

      - name: Generar functions/.env con parámetros de configuración
        # Los defineString() de functions/src/config.ts necesitan un valor en
        # despliegue no-interactivo (firebase deploy no puede preguntar). Se
        # escribe un .env específico del proyecto con los valores no-secretos;
        # los que el repo tenga como secreto de GitHub sobrescriben el default.
        # Este archivo NO se commitea (.env* está en .gitignore) — se genera en
        # cada corrida de CI. Los valores realmente secretos van por Secret
        # Manager (paso anterior), no aquí.
        run: |
          cat > functions/.env.protea-andrea-delgado <<EOF
          PLANNER_EMAIL=${PLANNER_EMAIL:-hola@proteaeventos.mx}
          PLANNER_PHONE=${PLANNER_PHONE:-}
          PLANNER_ADMIN_EMAILS=${PLANNER_ADMIN_EMAILS:-}
          WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
          PAC_BASE_URL=${PAC_BASE_URL:-https://apisandbox.facturama.mx}
          CFDI_ISSUER_RFC=${CFDI_ISSUER_RFC:-}
          CFDI_ISSUER_NAME=${CFDI_ISSUER_NAME:-}
          CFDI_ISSUER_TAX_REGIME=${CFDI_ISSUER_TAX_REGIME:-612}
          CFDI_EXPEDITION_ZIP=${CFDI_EXPEDITION_ZIP:-}
          EOF
        env:
          PLANNER_EMAIL: ${{ secrets.PLANNER_EMAIL }}
          PLANNER_PHONE: ${{ secrets.PLANNER_PHONE }}
          PLANNER_ADMIN_EMAILS: ${{ secrets.PLANNER_ADMIN_EMAILS }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          PAC_BASE_URL: ${{ secrets.PAC_BASE_URL }}
          CFDI_ISSUER_RFC: ${{ secrets.CFDI_ISSUER_RFC }}
          CFDI_ISSUER_NAME: ${{ secrets.CFDI_ISSUER_NAME }}
          CFDI_ISSUER_TAX_REGIME: ${{ secrets.CFDI_ISSUER_TAX_REGIME }}
          CFDI_EXPEDITION_ZIP: ${{ secrets.CFDI_EXPEDITION_ZIP }}

      - name: Deploy Functions y reglas (CLI)
        run: |
          npm i -g firebase-tools
          # --force: acepta automáticamente la política de limpieza de imágenes
          # de Artifact Registry (evita que el deploy falle pidiéndola de forma
          # interactiva). No borra funciones no listadas por sí solo.
          firebase deploy \
            --only functions,firestore:rules,firestore:indexes,storage \
            --project protea-andrea-delgado \
            --force \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
